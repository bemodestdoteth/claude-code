server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    autoindex off;

    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; script-src 'none'; base-uri 'none'; frame-ancestors 'none'" always;
    add_header Cache-Control "no-store" always;

    location = / {
        default_type text/html;
        return 200 '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Claude Code Plan Preview</title></head><body><h1>Claude Code Plan Preview</h1><p>This server serves HTML plans from <code>/plan/&lt;project&gt;/&lt;plan&gt;.html</code>.</p><p>No directory listing is available.</p></body></html>';
    }

    location ~ ^/plan/[A-Za-z0-9._-]+/[A-Za-z0-9._-]+\.html$ {
        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
