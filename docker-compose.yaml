services:
  plan-preview:
    image: nginx:alpine
    container_name: claude-code-plan-preview
    restart: unless-stopped
    ports:
      - "${PLAN_PREVIEW_PORT:-4173}:80"
    volumes:
      - ${PLAN_PREVIEW_OUTPUT_DIR:-./.claude/plans}:/usr/share/nginx/html/plan:ro
      - ./scripts/plan-preview-nginx.conf:/etc/nginx/conf.d/default.conf:ro
